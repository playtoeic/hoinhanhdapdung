<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - QUẢN LÝ PHÒNG THI</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1e88e5; --red: #ff6b6b; --dark: #1a1a1a; --white: #fff; }
        body { background: var(--dark); color: var(--white); font-family: sans-serif; padding: 20px; }
        .panel { background: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid var(--blue); margin-bottom: 20px; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #000; color: #fff; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background: var(--blue); }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-add { background: var(--blue); color: white; }
        .btn-score { background: #00ff00; color: black; width: 100%; margin-top: 10px; }
        .btn-del { background: var(--red); color: white; padding: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <h2>TRANG QUẢN TRÒ (ADMIN)</h2>

    <div class="panel">
        <h3>1. Quản lý lớp học</h3>
        <input type="text" id="pName" placeholder="Tên học sinh mới...">
        <button class="btn btn-add" onclick="addPlayer()">THÊM HỌC SINH</button>
        <button class="btn" style="background: #555; color: white;" onclick="resetSystem()">RESET PHÒNG</button>
    </div>

    <div class="panel">
        <h3>2. Thiết lập Đáp án đúng</h3>
        <div id="ansKeys"></div>
        <button class="btn btn-score" onclick="finalize()">CÔNG BỐ & CHẤM ĐIỂM</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Xóa</th>
                <th>Học sinh</th>
                <th>Điểm</th>
                <th>Câu 1</th><th>Câu 2</th><th>Câu 3</th><th>Câu 4</th>
            </tr>
        </thead>
        <tbody id="adminTable"></tbody>
    </table>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhodfr-XjA3wzeeJTEdFRtn0KFBNJ4mLw",
        authDomain: "nghe-chon-dap-an.firebaseapp.com",
        databaseURL: "https://nghe-chon-dap-an-default-rtdb.firebaseio.com",
        projectId: "nghe-chon-dap-an",
        storageBucket: "nghe-chon-dap-an.firebasestorage.app",
        messagingSenderId: "251465237282",
        appId: "1:251465237282:web:de82395e7513a0774bdb7b",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const numQ = 4;

    // Render ô nhập đáp án đúng
    let keyHtml = '';
    for(let i=0; i<numQ; i++) {
        keyHtml += `Q${i+1}: <input type="text" style="width:30px" id="key-${i}" oninput="setKey(${i}, this.value)"> `;
    }
    document.getElementById('ansKeys').innerHTML = keyHtml;

    function setKey(i, val) { db.ref(`class_room/correct_keys/${i}`).set(val.toLowerCase()); }

    function addPlayer() {
        const name = document.getElementById('pName').value;
        if(name) { db.ref('class_room/players').push({ name: name, score: 0 }); document.getElementById('pName').value = ''; }
    }

    function deletePlayer(id) { if(confirm("Xóa học sinh này?")) db.ref(`class_room/players/${id}`).remove(); }

    function finalize() {
        db.ref('class_room').once('value', snap => {
            const data = snap.val();
            const updates = {};
            for(let id in data.players) {
                let s = 0;
                for(let i=0; i<numQ; i++) {
                    if(data.answers?.[id]?.[i] === data.correct_keys?.[i]) s++;
                }
                updates[`class_room/players/${id}/score`] = s;
            }
            updates['class_room/finalized'] = true;
            db.ref().update(updates);
        });
    }

    function resetSystem() { if(confirm("Xóa hết?")) db.ref('class_room').remove(); }

    db.ref('class_room').on('value', snap => {
        const data = snap.val() || {};
        const tbody = document.getElementById('adminTable');
        tbody.innerHTML = '';
        
        // Sync đáp án đúng vào ô input admin
        for(let i=0; i<numQ; i++) {
            if(data.correct_keys?.[i]) document.getElementById(`key-${i}`).value = data.correct_keys[i];
        }

        for(let id in data.players) {
            let row = `<tr>
                <td><button class="btn-del" onclick="deletePlayer('${id}')">X</button></td>
                <td>${data.players[id].name}</td>
                <td>${data.players[id].score}</td>`;
            for(let i=0; i<numQ; i++) {
                row += `<td>${data.answers?.[id]?.[i] || '-'}</td>`;
            }
            tbody.innerHTML += row + `</tr>`;
        }
    });
</script>
</body>
</html>
