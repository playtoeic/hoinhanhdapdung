<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - QUẢN LÝ PHÒNG THI</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1e88e5; --red: #ff6b6b; --dark: #1a1a1a; --white: #fff; }
        body { background: var(--dark); color: var(--white); font-family: sans-serif; padding: 20px; }
        .panel { background: #2d2d2d; padding: 15px; border-radius: 8px; border: 1px solid var(--blue); margin-bottom: 20px; }
        
        input, textarea { 
            padding: 8px; border-radius: 4px; border: 1px solid #444; 
            background: #000; color: #fff; margin-right: 10px; 
            text-transform: uppercase; 
        }

        textarea { width: 100%; box-sizing: border-box; margin-bottom: 10px; text-transform: none; resize: vertical; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; text-transform: uppercase; }
        th { background: var(--blue); font-size: 0.8rem; }
        
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-add { background: var(--blue); color: white; width: 100%; }
        .btn-score { background: #00ff00; color: black; width: 100%; margin-top: 10px; }
        .btn-del { background: var(--red); color: white; padding: 5px; font-size: 10px; }

        .admin-correct { background-color: rgba(0, 255, 0, 0.2); color: #00ff00; font-weight: bold; }
        .flex-container { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <h2>PLAYTOEIC (ADMIN)</h2>

    <div class="panel">
        <h3>1. Quản lý lớp học (Thêm hàng loạt)</h3>
        <div class="flex-container">
            <textarea id="bulkNames" rows="5" placeholder="Dán danh sách tên tại đây (Mỗi tên một dòng)..."></textarea>
            <button class="btn btn-add" onclick="addBulkPlayers()">THÊM DANH SÁCH HỌC SINH</button>
            <button class="btn" style="background: #555; color: white;" onclick="resetSystem()">XÓA HẾT DỮ LIỆU PHÒNG</button>
        </div>
    </div>

    <div class="panel">
        <h3>2. Thiết lập Đáp án đúng</h3>
        <div id="ansKeys"></div>
        <button class="btn btn-score" onclick="finalize()">CÔNG BỐ & CHẤM ĐIỂM</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Xóa</th>
                <th>Học sinh</th>
                <th>Điểm</th>
                <script>
                    for(let i=1; i<=15; i++) document.write(`<th>${i}</th>`);
                </script>
            </tr>
        </thead>
        <tbody id="adminTable"></tbody>
    </table>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAhodfr-XjA3wzeeJTEdFRtn0KFBNJ4mLw",
        authDomain: "nghe-chon-dap-an.firebaseapp.com",
        databaseURL: "https://nghe-chon-dap-an-default-rtdb.firebaseio.com",
        projectId: "nghe-chon-dap-an",
        storageBucket: "nghe-chon-dap-an.firebasestorage.app",
        messagingSenderId: "251465237282",
        appId: "1:251465237282:web:de82395e7513a0774bdb7b",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const numQ = 15;

    let keyHtml = '';
    for(let i=0; i<numQ; i++) {
        keyHtml += `Q${i+1}: <input type="text" style="width:30px; margin-bottom:5px" id="key-${i}" oninput="setKey(${i}, this.value)"> `;
    }
    document.getElementById('ansKeys').innerHTML = keyHtml;

    function setKey(i, val) { 
        db.ref(`class_room/correct_keys/${i}`).set(val.toLowerCase()); 
    }

    // HÀM THÊM HÀNG LOẠT
    function addBulkPlayers() {
        const textArea = document.getElementById('bulkNames');
        const lines = textArea.value.split('\n');
        let count = 0;

        lines.forEach(line => {
            const name = line.trim();
            if (name !== "") {
                db.ref('class_room/players').push({ name: name, score: 0 });
                count++;
            }
        });

        if (count > 0) {
            alert(`Đã thêm thành công ${count} học sinh!`);
            textArea.value = '';
        } else {
            alert("Vui lòng nhập hoặc dán danh sách tên!");
        }
    }

    function deletePlayer(id) { 
        if(confirm("Xóa học sinh này?")) {
            db.ref(`class_room/players/${id}`).remove();
            db.ref(`class_room/answers/${id}`).remove();
        }
    }

    function finalize() {
        db.ref('class_room').once('value', snap => {
            const data = snap.val();
            const updates = {};
            for(let id in data.players) {
                let s = 0;
                for(let i=0; i<numQ; i++) {
                    const studentAns = data.answers?.[id]?.[i];
                    const correctKey = data.correct_keys?.[i];
                    if(studentAns && studentAns === correctKey) s++;
                }
                updates[`class_room/players/${id}/score`] = s;
            }
            updates['class_room/finalized'] = true;
            db.ref().update(updates);
        });
    }

    function resetSystem() { 
        if(confirm("Xóa hết dữ liệu phòng?")) db.ref('class_room').remove(); 
    }

    db.ref('class_room').on('value', snap => {
        const data = snap.val() || {};
        const tbody = document.getElementById('adminTable');
        tbody.innerHTML = '';
        
        for(let i=0; i<numQ; i++) {
            const input = document.getElementById(`key-${i}`);
            if(data.correct_keys?.[i] && document.activeElement !== input) {
                input.value = data.correct_keys[i];
            }
        }

        for(let id in data.players) {
            let row = `<tr>
                <td><button class="btn-del" onclick="deletePlayer('${id}')">X</button></td>
                <td style="text-align:left">${data.players[id].name}</td>
                <td style="color:#00ff00; font-weight:bold">${data.players[id].score || 0}</td>`;
            
            for(let i=0; i<numQ; i++) {
                const studentAns = data.answers?.[id]?.[i] || '';
                const correctKey = data.correct_keys?.[i] || '';
                const isCorrect = (correctKey !== "" && studentAns === correctKey);
                const cellClass = isCorrect ? 'class="admin-correct"' : '';
                row += `<td ${cellClass}>${studentAns || '-'}</td>`;
            }
            tbody.innerHTML += row + `</tr>`;
        }
    });
</script>
</body>
</html>
